name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agendita_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agendita_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/agendita_test
      NODE_ENV: test
      NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-key-for-tests
      APP_DOMAIN: localhost:3000
      NEXT_PUBLIC_APP_DOMAIN: localhost:3000
      PAYMENT_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run test:integration

  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agendita_build
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/agendita_build
      NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-key-build
      APP_DOMAIN: localhost:3000
      NEXT_PUBLIC_APP_DOMAIN: localhost:3000
      PAYMENT_PROVIDER: mock
      ENABLE_E2E_AUTH_BYPASS: 'true'
      E2E_AUTH_BYPASS_SECRET: 'e2e-secret-ci-2026'
      NEXT_PUBLIC_E2E_AUTH_BYPASS_SECRET: 'e2e-secret-ci-2026'
      APP_ENV: 'e2e'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: next-build-e2e
          path: .next
          include-hidden-files: true
          retention-days: 1

  e2e:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agendita_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agendita_e2e
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/agendita_e2e
      NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-key-e2e
      SUPABASE_SERVICE_ROLE_KEY: e2e-service-role-key
      APP_DOMAIN: localhost:3000
      NEXT_PUBLIC_APP_DOMAIN: localhost:3000
      PAYMENT_PROVIDER: mock
      ALLOW_MOCK_PAYMENTS_IN_PRODUCTION: 'true'
      ENABLE_E2E_AUTH_BYPASS: 'true'
      E2E_AUTH_BYPASS_SECRET: 'e2e-secret-ci-2026'
      APP_ENV: 'e2e'
      PLAYWRIGHT_E2E_AUTH_SECRET: 'e2e-secret-ci-2026'
      # Grants the seeded admin@agendita.com platform-admin access for the
      # /admin smoke tests (setAdminAuth uses this email).
      PLATFORM_ADMIN_EMAILS: 'admin@agendita.com'
      # Run the node test runner in the seeded business's timezone so runner-side
      # date math (nextBookableDate) matches the browser (timezoneId).
      TZ: 'America/Santiago'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci --include=dev
      - uses: actions/download-artifact@v4
        with:
          name: next-build-e2e
          path: .next
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run db:seed
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
