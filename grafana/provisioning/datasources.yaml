# Grafana provisioning — datasources
# Grafana reads this file on startup to configure data sources.
# For production: set PROMETHEUS_URL env var and reference it via ${PROMETHEUS_URL}
#
# Grafana Cloud authentication for /api/metrics:
#
# Option A — Bearer token (recommended when METRICS_SECRET is set):
#   In Grafana Cloud → "Add auth header" → "Authorization: Bearer <METRICS_SECRET>"
#   Or when using Prometheus scraping, configure the scrape job with:
#     bearer_token: "<METRICS_SECRET value>"
#
# Option B — Basic auth (service account):
#   Grafana Cloud → Service Account → Create token → Use as Basic auth user:token
#
# Option C — No auth (METRICS_SECRET not set, dev/staging only):
#   Leave authorization header out; endpoint allows unauthenticated access.
#   WARNING: Do NOT use in production without METRICS_SECRET.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-agendita
    access: proxy
    url: ${PROMETHEUS_URL}
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: 15s
    # Secure settings (stored encrypted in Grafana, not in this file):
    # secureJsonData:
    #   httpHeaderValue1: "Bearer <token>"   # For bearer auth to /api/metrics
    version: 1