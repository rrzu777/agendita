# Grafana provisioning — datasources
# Grafana reads this file on startup to configure data sources.
# Supports Prometheus, Loki, Tempo, Jaeger, etc.
# For production: set PROMETHEUS_URL env var and reference it via ${PROMETHEUS_URL}
# or hardcode the URL below and manage credentials via Grafana's secure JSON data.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-agendita
    access: proxy
    url: ${PROMETHEUS_URL}
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: 15s
    # Secure settings (stored encrypted in Grafana, not in this file):
    # secureJsonData:
    #   httpHeaderValue1: Bearer <your-token>
    # Uncomment and set via environment variable or CI/CD secrets injection.
    version: 1