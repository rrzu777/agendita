# Alert: Bookings stalled
# Fires when <5 bookings created today AND yesterday had >20 bookings
# This indicates a potential issue with the booking flow or external dependency
# Requires: Prometheus counters for bookings created, with businessId label
# Channel: Slack webhook (no paging — warning only)

groups:
  - name: agendita-bookings
    rules:
      - alert: BookingsStalled
        expr: |
          (
            sum(increase(agendita_bookings_total{status="confirmed"}[1d])) < 5
          )
          and
          (
            sum(increase(agendita_bookings_total{status="confirmed"}[1d] offset 1d)) > 20
          )
        for: 30m
        labels:
          severity: warning
          team: growth
        annotations:
          summary: "Booking creation appears stalled"
          description: "Fewer than 5 bookings created today, but over 20 were created yesterday. Investigate potential issues with the booking flow or external dependencies."